#!/usr/bin/env bash
# programs.conf — Single source of truth for modules, packages, and shared content.
# Sourced by both setup-host.sh and setup-docker.sh.
# To add/remove a program: edit here only.

# ─── Config ───────────────────────────────────────────────────────────────────
# Miniconda version. "latest" = rolling. Pin with e.g. "py311_24.9.2-0"
MINICONDA_VERSION="${MINICONDA_VERSION:-latest}"

# Base Ubuntu image used when building Docker containers
DOCKER_BASE_IMAGE="${DOCKER_BASE_IMAGE:-ubuntu:24.04}"

# OpenFOAM version (ESI/OpenCFD — openfoam.com). e.g. 2506, 2412
OPENFOAM_VERSION="${OPENFOAM_VERSION:-2506}"

# ─── Modules (shared by host + Docker) ───────────────────────────────────────
# Format: "id|Display label|ON or OFF (default)"
SHARED_MODULES=(
    "system-update|System Update (apt update + upgrade)|ON"
    "base-packages|Base Packages (micro, nnn, btop, fzf, git, wget...)|ON"
    "miniconda|Miniconda (Python distribution)|ON"
    "conda-init|Conda Init (.bashrc initialization)|ON"
    "mamba|Mamba (faster conda solver)|ON"
    "nnn-plugin|nnn runfile plugin|ON"
    "bashrc-core|Shell aliases + NNN_PLUG export|ON"
    "conda-manager|conda_manager() fzf TUI function|ON"
    "mamba-manager|mamba_manager() fzf TUI function|ON"
    "openfoam|OpenFOAM CFD solver (adds repo if needed)|OFF"
    "paraview|ParaView visualization tool|OFF"
    "freecad|FreeCAD 3D CAD software|OFF"
    "claude-code|Claude Code CLI (AI coding assistant)|ON"
)

# Modules that only make sense on a real host machine (not in Docker)
HOST_ONLY_MODULES=(
    "docker|Docker Engine + group setup|ON"
    "nvidia-toolkit|NVIDIA Container Toolkit (skips if no GPU)|ON"
)

# Modules that only apply when building/running a Docker container
DOCKER_ONLY_MODULES=(
    "host-network|Map all ports to host (--network=host)|OFF"
    "auto-remove|Remove container on exit (--rm)|ON"
)

# ─── Package Lists ────────────────────────────────────────────────────────────
# Packages installed by the "base-packages" module (shared: host + Docker)
PKGS_BASE=(
    micro nnn btop fzf curl git wget
    python3 python3-pip nodejs npm
    build-essential lsb-release ncurses-term
)

# Extra packages installed on host only (not needed inside a container)
PKGS_HOST_EXTRA=(timeshift)

# Per-module apt packages
PKGS_PARAVIEW=(paraview)
PKGS_FREECAD=(freecad)

# ─── Shared Functions ─────────────────────────────────────────────────────────

# Returns the correct Miniconda installer URL for the current arch + version
miniconda_url() {
    local arch
    case "$(uname -m)" in
        x86_64)        arch="x86_64" ;;
        aarch64|arm64) arch="aarch64" ;;
        *)             arch="x86_64" ;;
    esac
    if [[ "$MINICONDA_VERSION" == "latest" ]]; then
        printf 'https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-%s.sh' "$arch"
    else
        printf 'https://repo.anaconda.com/miniconda/Miniconda3-%s-Linux-%s.sh' \
            "$MINICONDA_VERSION" "$arch"
    fi
}

# Prints the nnn runfile plugin content to stdout (r key: run and return to nnn)
get_nnn_plugin_content() {
    cat << 'PLUGEOF'
#!/usr/bin/env bash
f="$nnn"
d="$(dirname -- "$f")"
b="$(basename -- "$f")"
cd -- "$d" || exit 1
case "$b" in
  *.sh)
    [ -x "$b" ] || chmod +x "$b"
    ./"$b"
    ;;
  *.py)
    python3 "$b"
    ;;
  *.js)
    node "$b"
    ;;
  *)
    if [ -x "$b" ]; then
      ./"$b"
    else
      echo "Do not know how to run: $b"
      read -r _
    fi
    ;;
esac
PLUGEOF
}

# Prints the nnn runfile-exit plugin content to stdout (R key: run and drop to shell)
get_nnn_exit_plugin_content() {
    cat << 'PLUGEOF'
#!/usr/bin/env bash
f="$nnn"
d="$(dirname -- "$f")"
b="$(basename -- "$f")"
cd -- "$d" || exit 1
case "$b" in
  *.sh)
    [ -x "$b" ] || chmod +x "$b"
    ./"$b"
    ;;
  *.py)
    python3 "$b"
    ;;
  *.js)
    node "$b"
    ;;
  *)
    if [ -x "$b" ]; then
      ./"$b"
    else
      echo "Do not know how to run: $b"
    fi
    ;;
esac
# Quit nnn rather than returning to it.
# Process chain: nnn -> sh -> this script, so nnn's PID is our grandparent.
_nnn_pid=$(ps -o ppid= -p "$PPID" 2>/dev/null | tr -d ' ')
[ -n "$_nnn_pid" ] && kill -TERM "$_nnn_pid" 2>/dev/null
PLUGEOF
}

# Interactive checkbox selector — pure bash, no whiptail needed.
# Reads from MODULES[], populates ENABLED[].
# Usage: run_selector "Title"
run_selector() {
    local title="$1"
    local -a _ids _labels _states
    local _entry _id _label _default _i=0
    for _entry in "${MODULES[@]}"; do
        IFS='|' read -r _id _label _default <<< "$_entry"
        _ids+=("$_id")
        _labels+=("$_label")
        _states+=( "$([ "$_default" == "ON" ] && echo 1 || echo 0)" )
        (( _i++ ))
    done
    local _n=${#_ids[@]} _cur=0 _k _esc _j

    local _tty; _tty=$(stty -g 2>/dev/null)
    tput civis 2>/dev/null
    stty -echo -icanon min 1 time 0 2>/dev/null
    trap 'stty "$_tty" 2>/dev/null; tput cnorm 2>/dev/null; trap - INT TERM; printf "\nCancelled.\n"; exit 130' INT TERM

    _sel_draw() {
        for (( _j=0; _j<_n; _j++ )); do
            printf '\r'
            (( _j == _cur )) && printf '  \033[1;36m▶\033[0m ' || printf '    '
            (( _states[_j] )) && printf '\033[1;32m●\033[0m ' || printf '\033[2m○\033[0m '
            (( _j == _cur )) \
                && printf '\033[1m%s\033[0m' "${_labels[_j]}" \
                || printf '%s' "${_labels[_j]}"
            tput el; printf '\n'
        done
    }

    printf '\n  \033[1m%s\033[0m\n' "$title"
    printf '  \033[2m↑↓ navigate · space toggle · enter confirm\033[0m\n\n'
    _sel_draw

    while true; do
        IFS= read -rsn1 _k
        case "$_k" in
            $'\x1b')
                IFS= read -rsn2 -t 0.1 _esc || true
                case "$_esc" in
                    '[A') (( _cur > 0      )) && (( _cur-- )) ;;
                    '[B') (( _cur < _n - 1 )) && (( _cur++ )) ;;
                esac ;;
            ' ') _states[$_cur]=$(( 1 - _states[$_cur] )) ;;
            ''|$'\n') break ;;
        esac
        tput cuu "$_n"; _sel_draw
    done

    printf '\n'
    stty "$_tty" 2>/dev/null; tput cnorm 2>/dev/null
    trap - INT TERM

    for (( _i=0; _i<_n; _i++ )); do
        (( _states[_i] )) && ENABLED["${_ids[$_i]}"]=1
    done
}

# Prints the cm() function body to stdout — unified env manager, uses mamba if available
get_cm_content() {
    cat << 'CMEOF'
cm() {
    local _cmd
    command -v mamba &>/dev/null && _cmd=mamba || _cmd=conda
    local selected
    selected=$(
        { printf '[ + create new ]\n'; $_cmd env list | sed '1,2d' | awk '{print $1}' | sed '/^$/d'; } \
            | fzf --height 40% --reverse --border --prompt="Env > "
    )
    [ -z "$selected" ] && return
    if [ "$selected" = "[ + create new ]" ]; then
        read -rp "Environment name: " new_name
        [ -z "$new_name" ] && return
        local tool="$_cmd"
        if command -v mamba &>/dev/null && command -v conda &>/dev/null; then
            tool=$(printf "mamba\nconda" | fzf --height 15% --reverse --border --prompt="Tool > ")
            [ -z "$tool" ] && return
        fi
        read -rp "Python version (e.g. 3.11, blank for default): " py_ver
        if [ -n "$py_ver" ]; then
            $tool create --name "$new_name" "python=$py_ver" -y
        else
            $tool create --name "$new_name" -y
        fi
        return
    fi
    local action
    action=$(printf "activate\ndelete\nclone\ninfo\nlist packages" \
        | fzf --height 40% --reverse --border --prompt="Action ($selected) > ")
    case "$action" in
        activate)        conda activate "$selected" ;;
        delete)          $_cmd remove -n "$selected" --all ;;
        clone)
            read -rp "New env name: " new_name
            [ -z "$new_name" ] && return
            $_cmd create --name "$new_name" --clone "$selected"
            ;;
        info)            $_cmd env list | grep "$selected" ;;
        "list packages") $_cmd list -n "$selected" ;;
    esac
}
CMEOF
}


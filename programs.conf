SUBITEMS_base_packages=(
    "micro|micro — lightweight text editor|ON"
    "nnn|nnn — terminal file manager|ON"
    "btop|btop — resource monitor|ON"
    "fzf|fzf — fuzzy finder|ON"
    "curl|curl|ON"
    "git|git|ON"
    "gh|gh — GitHub CLI|ON"
    "wget|wget|ON"
    "python3|python3|ON"
    "python3-pip|python3-pip|ON"
    "nodejs|nodejs|ON"
    "npm|npm|ON"
    "build-essential|build-essential|ON"
    "lsb-release|lsb-release|ON"
    "ncurses-term|ncurses-term|ON"
)

SUBITEMS_nnn_plugin=(
    "runfile|r key — run script, return to nnn|ON"
    "runfile-exit|R key — run script, exit to shell|ON"
)

declare -A SUBITEM_ENABLED=()
module_has_subitems() { declare -p "SUBITEMS_${1//-/_}" &>/dev/null 2>&1; }
# Defaults to 1 (enabled) when a sub-item has never been explicitly set
is_subitem_enabled()  { [[ "${SUBITEM_ENABLED["$1:$2"]:-1}" == "1" ]]; }

# ─── Shared Functions ─────────────────────────────────────────────────────────

# Returns the correct Miniconda installer URL for the current arch + version
miniconda_url() {
    local arch
    case "$(uname -m)" in
        x86_64)        arch="x86_64" ;;
        aarch64|arm64) arch="aarch64" ;;
        *)             arch="x86_64" ;;
    esac
    if [[ "$MINICONDA_VERSION" == "latest" ]]; then
        printf 'https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-%s.sh' "$arch"
    else
        printf 'https://repo.anaconda.com/miniconda/Miniconda3-%s-Linux-%s.sh' \
            "$MINICONDA_VERSION" "$arch"
    fi
}

# Prints the nnn runfile plugin content to stdout (r key: run and return to nnn)
get_nnn_plugin_content() {
    cat << 'PLUGEOF'
#!/usr/bin/env bash
f="$nnn"
d="$(dirname -- "$f")"
b="$(basename -- "$f")"
cd -- "$d" || exit 1
case "$b" in
  *.sh)
    [ -x "$b" ] || chmod +x "$b"
    ./"$b"
    ;;
  *.py)
    python3 "$b"
    ;;
  *.js)
    node "$b"
    ;;
  *)
    if [ -x "$b" ]; then
      ./"$b"
    else
      echo "Do not know how to run: $b"
      read -r _
    fi
    ;;
esac
PLUGEOF
}

# Prints the nnn runfile-exit plugin content to stdout (R key: run and drop to shell)
get_nnn_exit_plugin_content() {
    cat << 'PLUGEOF'
#!/usr/bin/env bash
f="$nnn"
d="$(dirname -- "$f")"
b="$(basename -- "$f")"
cd -- "$d" || exit 1
case "$b" in
  *.sh)
    [ -x "$b" ] || chmod +x "$b"
    ./"$b"
    ;;
  *.py)
    python3 "$b"
    ;;
  *.js)
    node "$b"
    ;;
  *)
    if [ -x "$b" ]; then
      ./"$b"
    else
      echo "Do not know how to run: $b"
    fi
    ;;
esac
# Quit nnn rather than returning to it.
# Process chain: nnn -> sh -> this script, so nnn's PID is our grandparent.
_nnn_pid=$(ps -o ppid= -p "$PPID" 2>/dev/null | tr -d ' ')
[ -n "$_nnn_pid" ] && kill -TERM "$_nnn_pid" 2>/dev/null
PLUGEOF
}

# Drill-down sub-item selector — called from run_selector on → keypress.
# Reads SUBITEMS_<mod_id> array, writes results to SUBITEM_ENABLED["mod:item"].
_run_sub_selector() {
    local _mod_id="$1" _mod_label="$2"
    local _svar="SUBITEMS_${_mod_id//-/_}"
    declare -n _sarr="$_svar"

    local -a _sids _slabels _sstates
    local _se _sid _slbl _sdef _si=0
    for _se in "${_sarr[@]}"; do
        IFS='|' read -r _sid _slbl _sdef <<< "$_se"
        _sids+=("$_sid")
        _slabels+=("$_slbl")
        if [[ -n "${SUBITEM_ENABLED["$_mod_id:$_sid"]+x}" ]]; then
            _sstates+=("${SUBITEM_ENABLED["$_mod_id:$_sid"]}")
        else
            _sstates+=("$([ "$_sdef" == "ON" ] && echo 1 || echo 0)")
        fi
        (( _si++ ))
    done
    unset -n _sarr

    local _sn=${#_sids[@]} _scur=0 _sk _sesc _sj

    local _stty; _stty=$(stty -g 2>/dev/null)
    tput civis 2>/dev/null
    stty -echo -icanon min 1 time 0 2>/dev/null

    _ssub_draw() {
        for (( _sj=0; _sj<_sn; _sj++ )); do
            printf '\r'
            (( _sj == _scur )) && printf '  \033[1;36m▶\033[0m ' || printf '    '
            (( _sstates[_sj] )) && printf '\033[1;32m●\033[0m ' || printf '\033[2m○\033[0m '
            (( _sj == _scur )) \
                && printf '\033[1m%s\033[0m' "${_slabels[$_sj]}" \
                || printf '%s' "${_slabels[$_sj]}"
            tput el; printf '\n'
        done
    }

    printf '\n  \033[1m%s\033[0m  \033[2;36m▸  sub-items\033[0m\n' "$_mod_label"
    printf '  \033[2m↑↓ navigate · space toggle · ← back\033[0m\n\n'
    _ssub_draw

    while true; do
        IFS= read -rsn1 _sk
        case "$_sk" in
            $'\x1b')
                IFS= read -rsn2 -t 0.1 _sesc || true
                case "$_sesc" in
                    '[A') (( _scur > 0       )) && (( _scur-- )) ;;
                    '[B') (( _scur < _sn - 1 )) && (( _scur++ )) ;;
                    '[D') break ;;  # left arrow — back
                esac ;;
            ' ') _sstates[$_scur]=$(( 1 - _sstates[$_scur] )) ;;
            ''|$'\n') break ;;
        esac
        tput cuu "$_sn"; _ssub_draw
    done

    printf '\n'
    stty "$_stty" 2>/dev/null; tput cnorm 2>/dev/null

    for (( _si=0; _si<_sn; _si++ )); do
        SUBITEM_ENABLED["$_mod_id:${_sids[$_si]}"]="${_sstates[$_si]}"
    done
}

# Interactive checkbox selector — pure bash, no whiptail needed.
# Reads from MODULES[], populates ENABLED[].
# Modules marked ▸ can be expanded with → for fine-grained sub-item control.
# Usage: run_selector "Title"
run_selector() {
    local title="$1"
    local -a _ids _labels _states
    local _entry _id _label _default _i=0
    for _entry in "${MODULES[@]}"; do
        IFS='|' read -r _id _label _default <<< "$_entry"
        _ids+=("$_id")
        _labels+=("$_label")
        _states+=( "$([ "$_default" == "ON" ] && echo 1 || echo 0)" )
        (( _i++ ))
    done
    local _n=${#_ids[@]} _cur=0 _k _esc _j

    local _tty; _tty=$(stty -g 2>/dev/null)
    tput civis 2>/dev/null
    stty -echo -icanon min 1 time 0 2>/dev/null
    trap 'stty "$_tty" 2>/dev/null; tput cnorm 2>/dev/null; trap - INT TERM; printf "\nCancelled.\n"; exit 130' INT TERM

    _sel_draw() {
        for (( _j=0; _j<_n; _j++ )); do
            printf '\r'
            (( _j == _cur )) && printf '  \033[1;36m▶\033[0m ' || printf '    '
            (( _states[_j] )) && printf '\033[1;32m●\033[0m ' || printf '\033[2m○\033[0m '
            local _has_sub=0
            declare -p "SUBITEMS_${_ids[$_j]//-/_}" &>/dev/null 2>&1 && _has_sub=1
            if (( _j == _cur )); then
                printf '\033[1m%s\033[0m' "${_labels[$_j]}"
                (( _has_sub )) && printf ' \033[2;36m▸\033[0m'
            else
                printf '%s' "${_labels[$_j]}"
                (( _has_sub )) && printf ' \033[2m▸\033[0m'
            fi
            tput el; printf '\n'
        done
    }

    printf '\n  \033[1m%s\033[0m\n' "$title"
    printf '  \033[2m↑↓ navigate · space toggle · → expand · enter confirm\033[0m\n\n'
    _sel_draw

    local _redraw_full=0
    while true; do
        _redraw_full=0
        IFS= read -rsn1 _k
        case "$_k" in
            $'\x1b')
                IFS= read -rsn2 -t 0.1 _esc || true
                case "$_esc" in
                    '[A') (( _cur > 0      )) && (( _cur-- )) ;;
                    '[B') (( _cur < _n - 1 )) && (( _cur++ )) ;;
                    '[C')
                        local _svar="SUBITEMS_${_ids[$_cur]//-/_}"
                        if declare -p "$_svar" &>/dev/null 2>&1; then
                            stty "$_tty" 2>/dev/null; tput cnorm 2>/dev/null
                            _run_sub_selector "${_ids[$_cur]}" "${_labels[$_cur]}"
                            tput civis 2>/dev/null
                            stty -echo -icanon min 1 time 0 2>/dev/null
                            _redraw_full=1
                        fi ;;
                esac ;;
            ' ') _states[$_cur]=$(( 1 - _states[$_cur] )) ;;
            ''|$'\n') break ;;
        esac
        if (( _redraw_full )); then
            printf '\n  \033[1m%s\033[0m\n' "$title"
            printf '  \033[2m↑↓ navigate · space toggle · → expand · enter confirm\033[0m\n\n'
            _sel_draw
        else
            tput cuu "$_n"; _sel_draw
        fi
    done

    printf '\n'
    stty "$_tty" 2>/dev/null; tput cnorm 2>/dev/null
    trap - INT TERM

    for (( _i=0; _i<_n; _i++ )); do
        (( _states[_i] )) && ENABLED["${_ids[$_i]}"]=1
    done
}

# Prints the cm() function body to stdout — unified env manager, uses mamba if available
get_cm_content() {
    cat << 'CMEOF'
cm() {
    local _cmd
    command -v mamba &>/dev/null && _cmd=mamba || _cmd=conda
    local selected
    selected=$(
        { printf '[ + create new ]\n'; $_cmd env list | sed '1,2d' | awk '{print $1}' | sed '/^$/d'; } \
            | fzf --height 40% --reverse --border --prompt="Env > "
    )
    [ -z "$selected" ] && return
    if [ "$selected" = "[ + create new ]" ]; then
        read -rp "Environment name: " new_name
        [ -z "$new_name" ] && return
        local tool="$_cmd"
        if command -v mamba &>/dev/null && command -v conda &>/dev/null; then
            tool=$(printf "mamba\nconda" | fzf --height 15% --reverse --border --prompt="Tool > ")
            [ -z "$tool" ] && return
        fi
        read -rp "Python version (e.g. 3.11, blank for default): " py_ver
        if [ -n "$py_ver" ]; then
            $tool create --name "$new_name" "python=$py_ver" -y
        else
            $tool create --name "$new_name" -y
        fi
        return
    fi
    local action
    action=$(printf "activate\ndelete\nclone\ninfo\nlist packages" \
        | fzf --height 40% --reverse --border --prompt="Action ($selected) > ")
    case "$action" in
        activate)        conda activate "$selected" ;;
        delete)          $_cmd remove -n "$selected" --all ;;
        clone)
            read -rp "New env name: " new_name
            [ -z "$new_name" ] && return
            $_cmd create --name "$new_name" --clone "$selected"
            ;;
        info)            $_cmd env list | grep "$selected" ;;
        "list packages") $_cmd list -n "$selected" ;;
    esac
}
CMEOF
}

